<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI API 中转站 · 0Lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #00d4ff; --bg: #000; --panel: #111; --border: #333; --muted: #888; }
    body { font-family: Inter, system-ui, -apple-system, sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; }
    .container { max-width: 720px; width: 100%; min-height: 100vh; display: flex; flex-direction: column; padding: 20px; }

    header h1 { font-size: 22px; font-weight: 600; }
    header h1 span { color: var(--accent); }
    header .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
    #status { color: var(--muted); font-size: 12px; margin-top: 6px; }
    #status.error { color: #f44; }

    .providers { display: flex; gap: 8px; margin: 14px 0; flex-wrap: wrap; }
    .providers button { padding: 6px 14px; border: 1px solid var(--border); background: var(--panel); color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s; }
    .providers button:hover:not(:disabled) { border-color: var(--accent); }
    .providers button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .providers button:disabled { opacity: .35; text-decoration: line-through; cursor: not-allowed; }

    .history { flex: 1; overflow-y: auto; padding: 8px 4px 16px; display: flex; flex-direction: column; gap: 14px; min-height: 0; }
    .msg { max-width: 85%; padding: 12px 14px; border-radius: 10px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: rgba(0, 212, 255, .12); border: 1px solid rgba(0, 212, 255, .4); }
    .msg.assistant { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
    .msg .tag { color: var(--accent); font-size: 11px; margin-bottom: 6px; font-weight: 600; letter-spacing: .5px; }
    .msg .err { color: #f44; }
    .cursor::after { content: '▋'; color: var(--accent); animation: blink 1s steps(2) infinite; margin-left: 2px; }
    @keyframes blink { 50% { opacity: 0; } }

    .empty { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 13px; }

    .input-area { border-top: 1px solid var(--border); padding-top: 14px; display: flex; gap: 10px; }
    textarea { flex: 1; height: 72px; padding: 12px; font-size: 15px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: #fff; resize: none; font-family: inherit; }
    textarea:focus { outline: none; border-color: var(--accent); }
    .input-area button { padding: 0 18px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
    .input-area button:hover:not(:disabled) { opacity: .85; }
    .input-area button:disabled { opacity: .35; cursor: not-allowed; }
    .input-area button.secondary { background: var(--panel); color: var(--muted); border: 1px solid var(--border); }

    .footer { text-align: center; margin-top: 12px; color: #555; font-size: 11px; }
    .footer a { color: var(--accent); text-decoration: none; }

    /* 密码门 */
    .lock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.92); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
    .lock-box { max-width: 360px; width: 100%; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 28px 24px; text-align: center; }
    .lock-box h2 { color: var(--accent); font-size: 18px; margin-bottom: 8px; }
    .lock-box p { color: var(--muted); font-size: 13px; line-height: 1.5; margin-bottom: 18px; }
    .lock-box input { width: 100%; padding: 12px; font-size: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-family: inherit; margin-bottom: 12px; }
    .lock-box input:focus { outline: none; border-color: var(--accent); }
    .lock-box button { width: 100%; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    .lock-box button:hover { opacity: .85; }
    .lock-box .lock-err { color: #f44; font-size: 12px; margin-top: 10px; min-height: 16px; }
    .lock-box .lock-hint { color: #555; font-size: 11px; margin-top: 14px; line-height: 1.5; }
    .lock-box .lock-hint code { background: var(--bg); padding: 1px 5px; border-radius: 3px; color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>AI API <span>中转站</span></h1>
      <p class="sub">Key 存在 EdgeOne 环境变量，前端零暴露 · 支持流式多轮</p>
      <div id="status">正在加载配置...</div>
    </header>

    <div class="providers" id="providers"></div>

    <div class="history" id="history">
      <div class="empty" id="emptyHint">输入问题开始对话 · Enter 发送 / Shift+Enter 换行</div>
    </div>

    <div class="input-area">
      <textarea id="prompt" placeholder="输入你的问题...">用三句话解释量子力学</textarea>
      <button id="send" onclick="ask()" disabled>发送</button>
      <button class="secondary" id="clear" onclick="clearChat()" title="清空对话">清空</button>
    </div>

    <div class="footer">
      基于 <a href="https://0l.cl" target="_blank">0Lab.cl</a> · EdgeOne Pages 免费部署
    </div>
  </div>

  <!-- 密码门（设了 ACCESS_TOKEN 时显示）-->
  <div class="lock-overlay" id="lockOverlay" style="display:none">
    <div class="lock-box">
      <h2>🔒 需要访问密码</h2>
      <p>本中转站已开启鉴权，请输入部署时设置的 <code style="color:var(--accent)">CHAT_PASSWORD</code></p>
      <input type="password" id="passwordInput" placeholder="输入访问密码" autocomplete="off">
      <button onclick="submitPassword()">进入</button>
      <div class="lock-err" id="lockErr"></div>
      <div class="lock-hint">密码仅存在本浏览器会话（sessionStorage），关闭浏览器后失效，需重新输入。不会上传到服务器存储。</div>
    </div>
  </div>

  <script>
    let provider = 'openai';
    let config = null;
    let messages = []; // 多轮上下文: [{role:'user'|'assistant', content}]

    const $ = id => document.getElementById(id);
    const TOKEN_KEY = 'apirelay_token'; // sessionStorage key

    // 拿 sessionStorage 里的 token（关浏览器失效，防长期暴露）
    function getToken() { return sessionStorage.getItem(TOKEN_KEY) || ''; }
    function setToken(t) { sessionStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { sessionStorage.removeItem(TOKEN_KEY); }

    // 统一的带鉴权 fetch
    async function authFetch(url, opts = {}) {
      const token = getToken();
      const headers = { ...(opts.headers || {}) };
      if (token) headers['X-API-Token'] = token;
      const res = await fetch(url, { ...opts, headers });
      // 401 → 清 token 弹密码门
      if (res.status === 401) {
        clearToken();
        showLock('密码已失效，请重新输入');
      }
      return res;
    }

    function showLock(errMsg = '') {
      $('lockOverlay').style.display = 'flex';
      $('passwordInput').value = '';
      $('lockErr').textContent = errMsg;
      setTimeout(() => $('passwordInput').focus(), 50);
    }

    function hideLock() { $('lockOverlay').style.display = 'none'; }

    async function submitPassword() {
      const pw = $('passwordInput').value.trim();
      if (!pw) { $('lockErr').textContent = '请输入密码'; return; }
      setToken(pw);
      // 用这个 token 试拉 config，验证是否正确
      try {
        const res = await fetch('/api/config', { headers: { 'X-API-Token': pw } });
        if (res.status === 401) {
          clearToken();
          $('lockErr').textContent = '密码错误，请重试';
          return;
        }
        if (!res.ok) throw new Error('HTTP ' + res.status);
        hideLock();
        config = await res.json();
        onConfigReady();
      } catch (e) {
        clearToken();
        $('lockErr').textContent = '验证失败: ' + e.message;
      }
    }

    // 密码框 Enter 提交
    $('passwordInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); submitPassword(); }
    });

    async function loadConfig() {
      const status = $('status');
      try {
        // 先无 token 试拉，判断是否需要鉴权
        const probe = await fetch('/api/config');
        if (probe.status === 401) {
          // 设了 ACCESS_TOKEN，弹密码门
          status.textContent = '需要访问密码';
          // 如果 sessionStorage 有 token，先试一次（刷新页面场景）
          const saved = getToken();
          if (saved) {
            const retry = await fetch('/api/config', { headers: { 'X-API-Token': saved } });
            if (retry.ok) {
              config = await retry.json();
              onConfigReady();
              return;
            }
            // token 失效，清掉
            clearToken();
          }
          showLock();
          return;
        }
        if (!probe.ok) throw new Error('HTTP ' + probe.status);
        config = await probe.json();
        onConfigReady();
      } catch (e) {
        status.textContent = '⚠️ 加载配置失败，请检查部署';
        status.className = 'error';
      }
    }

    function onConfigReady() {
      if (!config.chatEnabled) {
        document.body.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#888"><h2 style="color:#00d4ff;margin-bottom:12px">🔌 API 模式</h2><p>聊天页面已关闭，仅开放 API 接口。</p><p style="font-size:13px;margin-top:8px">使用 <code style="background:#111;padding:2px 6px;border-radius:4px">POST /api/chat</code> 或 <code style="background:#111;padding:2px 6px;border-radius:4px">POST /v1/chat/completions</code></p></div>`;
        return;
      }
      renderProviders(config.providers);
      const okCount = config.providers.filter(p => p.hasKey).length;
      $('status').textContent = `已加载 ${okCount}/${config.providers.length} 个供应商 · 默认 ${config.defaultProvider}`;
      $('send').disabled = false;
    }

    function renderProviders(providers) {
      const container = $('providers');
      container.innerHTML = providers.map((p, i) =>
        `<button class="${i === 0 ? 'active' : ''} ${p.hasKey ? '' : 'offline'}"
                 data-provider="${p.id}"
                 ${p.hasKey ? '' : 'disabled title="未配置 API Key"'}>${p.id.toUpperCase()}</button>`
      ).join('');

      const first = providers.find(p => p.hasKey);
      if (first) provider = first.id;

      container.querySelectorAll('button:not(:disabled)').forEach(btn => {
        btn.addEventListener('click', () => {
          container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          provider = btn.dataset.provider;
        });
      });
    }

    function addMessage(role, content, tag) {
      const history = $('history');
      $('emptyHint')?.remove();
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      if (role === 'assistant' && tag) {
        const t = document.createElement('div');
        t.className = 'tag';
        t.textContent = tag;
        el.appendChild(t);
        const body = document.createElement('div');
        body.className = 'body';
        body.textContent = content;
        el.appendChild(body);
      } else {
        el.textContent = content;
      }
      history.appendChild(el);
      history.scrollTop = history.scrollHeight;
      return role === 'assistant' ? el.querySelector('.body') : el;
    }

    function scrollToBottom() {
      const h = $('history');
      h.scrollTop = h.scrollHeight;
    }

    async function ask() {
      const textarea = $('prompt');
      const input = textarea.value.trim();
      if (!input) return;

      addMessage('user', input);
      messages.push({ role: 'user', content: input });
      textarea.value = '';

      const send = $('send');
      send.disabled = true;
      const bodyEl = addMessage('assistant', '', provider.toUpperCase());
      bodyEl.classList.add('cursor');
      bodyEl.textContent = '';

      try {
        const res = await authFetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider, messages, stream: true }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: { message: 'HTTP ' + res.status } }));
          bodyEl.classList.remove('cursor');
          bodyEl.className = 'err';
          bodyEl.textContent = '❌ ' + (err.error?.message || res.status);
          messages.pop();
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          bodyEl.textContent = full;
          scrollToBottom();
        }
        bodyEl.classList.remove('cursor');
        if (full) {
          messages.push({ role: 'assistant', content: full });
        } else {
          bodyEl.className = 'err';
          bodyEl.textContent = '⚠️ 空响应';
          messages.pop();
        }
      } catch (e) {
        bodyEl.classList.remove('cursor');
        bodyEl.className = 'err';
        bodyEl.textContent = '❌ ' + e.message;
        messages.pop();
      } finally {
        send.disabled = false;
        textarea.focus();
      }
    }

    function clearChat() {
      messages = [];
      const history = $('history');
      history.innerHTML = '<div class="empty" id="emptyHint">输入问题开始对话 · Enter 发送 / Shift+Enter 换行</div>';
    }

    $('prompt').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        ask();
      }
    });

    loadConfig();
  </script>
</body>
</html>

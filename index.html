<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>API 中转站 · lingzhanlab·0L.CL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #00d4ff; --bg: #000; --panel: #111; --border: #333; --muted: #888; }
    body { font-family: Inter, system-ui, -apple-system, sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; justify-content: center; }
    .container { max-width: 720px; width: 100%; min-height: 100vh; display: flex; flex-direction: column; padding: 20px; }

    header h1 { font-size: 22px; font-weight: 600; }
    header h1 span { color: var(--accent); }
    header .sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
    #status { color: var(--muted); font-size: 12px; margin-top: 6px; }
    #status.error { color: #f44; }

    .providers { display: flex; gap: 8px; margin: 14px 0; flex-wrap: wrap; }
    .providers button { padding: 6px 14px; border: 1px solid var(--border); background: var(--panel); color: #fff; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all .15s; }
    .providers button:hover:not(:disabled) { border-color: var(--accent); }
    .providers button.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .providers button:disabled { opacity: .35; text-decoration: line-through; cursor: not-allowed; }

    .history { flex: 1; overflow-y: auto; padding: 8px 4px 16px; display: flex; flex-direction: column; gap: 14px; min-height: 0; }
    .msg { max-width: 85%; padding: 12px 14px; border-radius: 10px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: rgba(0, 212, 255, .12); border: 1px solid rgba(0, 212, 255, .4); }
    .msg.assistant { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); }
    .msg .tag { color: var(--accent); font-size: 11px; margin-bottom: 6px; font-weight: 600; letter-spacing: .5px; }
    .msg .err { color: #f44; }
    .cursor::after { content: '▋'; color: var(--accent); animation: blink 1s steps(2) infinite; margin-left: 2px; }
    @keyframes blink { 50% { opacity: 0; } }

    .empty { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 13px; }

    .input-area { border-top: 1px solid var(--border); padding-top: 14px; display: flex; gap: 10px; }
    textarea { flex: 1; height: 72px; padding: 12px; font-size: 15px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: #fff; resize: none; font-family: inherit; }
    textarea:focus { outline: none; border-color: var(--accent); }
    .input-area button { padding: 0 18px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
    .input-area button:hover:not(:disabled) { opacity: .85; }
    .input-area button:disabled { opacity: .35; cursor: not-allowed; }
    .input-area button.secondary { background: var(--panel); color: var(--muted); border: 1px solid var(--border); }

    .footer { text-align: center; margin-top: 12px; color: #555; font-size: 11px; }
    .footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>API <span>中转站</span></h1>
      <p class="sub">Key 请在 EdgeOne 环境变量中设置</p>
      <div id="status">正在加载配置...</div>
    </header>

    <div class="providers" id="providers"></div>

    <div class="history" id="history">
      <div class="empty" id="emptyHint">输入问题开始对话 · Enter 发送 / Shift+Enter 换行</div>
    </div>

    <div class="input-area">
      <textarea id="prompt" placeholder="输入你的问题...">用三句话解释量子力学</textarea>
      <button id="send" onclick="ask()" disabled>发送</button>
      <button class="secondary" id="clear" onclick="clearChat()" title="清空对话">清空</button>
    </div>

    <div class="footer">
       <a href="https://0l.cl" target="_blank">0L.cl</a>
    </div>
  </div>

  <script>
    let provider = 'openai';
    let config = null;
    let messages = []; // 多轮上下文: [{role:'user'|'assistant', content}]

    const $ = id => document.getElementById(id);

    async function loadConfig() {
      const status = $('status');
      try {
        const res = await fetch('/api/config');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        config = await res.json();
        onConfigReady();
      } catch (e) {
        status.textContent = '⚠️ 加载配置失败，请检查部署';
        status.className = 'error';
      }
    }

    function onConfigReady() {
      if (!config.chatEnabled) {
        document.body.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#888"><h2 style="color:#00d4ff;margin-bottom:12px">🔌 仅 API 模式</h2><p>聊天页未启用，仅开放 API 接口。</p><p style="font-size:13px;margin-top:8px">使用 <code style="background:#111;padding:2px 6px;border-radius:4px">POST /v1/chat/completions</code></p><p style="font-size:12px;margin-top:16px;color:#555">如需开启聊天页，请设置环境变量 <code style="background:#111;padding:2px 6px;border-radius:4px">ENABLE_CHAT_PAGE=true</code></p></div>`;
        return;
      }
      renderProviders(config.providers);
      const okCount = config.providers.filter(p => p.hasKey).length;
      if (okCount === 0) {
        $('status').textContent = '⚠️ 未配置任何 API Key';
        $('status').className = 'error';
        $('send').disabled = true;
        $('history').innerHTML = '<div class="empty" style="color:#f44">未配置任何 API Key，请在 EdgeOne 环境变量设置 OPENAI_API_KEY / GEMINI_API_KEY / CLAUDE_API_KEY</div>';
        return;
      }
      $('status').textContent = `已加载 ${okCount}/${config.providers.length} 个供应商 · 默认 ${config.defaultProvider}`;
      $('send').disabled = false;
    }

    function renderProviders(providers) {
      const container = $('providers');
      const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      container.innerHTML = providers.map((p, i) =>
        `<button class="${i === 0 ? 'active' : ''} ${p.hasKey ? '' : 'offline'}"
                 data-provider="${esc(p.id)}"
                 ${p.hasKey ? '' : 'disabled title="未配置 API Key"'}>${esc(p.id.toUpperCase())}</button>`
      ).join('');

      const first = providers.find(p => p.hasKey);
      if (first) provider = first.id;

      container.querySelectorAll('button:not(:disabled)').forEach(btn => {
        btn.addEventListener('click', () => {
          container.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          provider = btn.dataset.provider;
        });
      });
    }

    function addMessage(role, content, tag) {
      const history = $('history');
      $('emptyHint')?.remove();
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      if (role === 'assistant' && tag) {
        const t = document.createElement('div');
        t.className = 'tag';
        t.textContent = tag;
        el.appendChild(t);
        const body = document.createElement('div');
        body.className = 'body';
        body.textContent = content;
        el.appendChild(body);
      } else {
        el.textContent = content;
      }
      history.appendChild(el);
      history.scrollTop = history.scrollHeight;
      return role === 'assistant' ? el.querySelector('.body') : el;
    }

    function scrollToBottom() {
      const h = $('history');
      h.scrollTop = h.scrollHeight;
    }

    async function ask() {
      const textarea = $('prompt');
      const input = textarea.value.trim();
      if (!input) return;

      addMessage('user', input);
      messages.push({ role: 'user', content: input });
      textarea.value = '';

      const send = $('send');
      send.disabled = true;
      const bodyEl = addMessage('assistant', '', provider.toUpperCase());
      bodyEl.classList.add('cursor');
      bodyEl.textContent = '';

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider, messages, stream: true }),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: { message: 'HTTP ' + res.status } }));
          bodyEl.classList.remove('cursor');
          bodyEl.className = 'err';
          bodyEl.textContent = '❌ ' + (err.error?.message || res.status);
          messages.pop();
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        let watchdog;
        const resetWatchdog = () => {
          clearTimeout(watchdog);
          watchdog = setTimeout(() => {
            reader.cancel().catch(() => {});
            bodyEl.classList.remove('cursor');
            bodyEl.className = 'err';
            bodyEl.textContent = (full || '') + '\n\n⚠️ 响应超时（30s 无数据）';
            if (!full) messages.pop();
          }, 30000);
        };
        resetWatchdog();
        while (true) {
          const { done, value } = await reader.read();
          resetWatchdog();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          bodyEl.textContent = full;
          scrollToBottom();
        }
        clearTimeout(watchdog);
        bodyEl.classList.remove('cursor');
        if (full) {
          messages.push({ role: 'assistant', content: full });
        } else {
          bodyEl.className = 'err';
          bodyEl.textContent = '⚠️ 空响应';
          messages.pop();
        }
      } catch (e) {
        bodyEl.classList.remove('cursor');
        bodyEl.className = 'err';
        bodyEl.textContent = '❌ ' + e.message;
        messages.pop();
      } finally {
        send.disabled = false;
        textarea.focus();
      }
    }

    function clearChat() {
      messages = [];
      const history = $('history');
      history.innerHTML = '<div class="empty" id="emptyHint">输入问题开始对话 · Enter 发送 / Shift+Enter 换行</div>';
    }

    $('prompt').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        ask();
      }
    });

    loadConfig();
  </script>
</body>
</html>
